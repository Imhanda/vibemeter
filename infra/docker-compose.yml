version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: vibemeter-postgres
    environment:
      POSTGRES_USER: vibemeter
      POSTGRES_PASSWORD: vibemeter
      POSTGRES_DB: vibemeter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgres/places_seed.csv:/docker-entrypoint-initdb.d/places_seed.csv

  redis:
    image: redis:7
    container_name: vibemeter-redis
    ports:
      - "6379:6379"

  yamnet:
    build: ./yamnet
    container_name: vibemeter-yamnet
    ports:
      - "8082:8082"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: vibemeter-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: vibe@admin.com
      PGADMIN_DEFAULT_PASSWORD: vibeadmin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGPASSFILE: /pgpass
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/pgpass
    depends_on:
      - postgres

volumes:
  pgdata: